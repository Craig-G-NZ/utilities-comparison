<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility & Broadband Analytics Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-surface: #1e293b;
            --bg-input: #334155;
            --border-muted: #334155;
            --border-focus: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --brand-primary: #38bdf8;
            --brand-success: #34d399;
            --brand-danger: #f87171;
            --brand-warning: #fb923c;
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { background-color: var(--bg-main); color: var(--text-primary); padding: 16px; min-height: 100vh; }

        .container { max-width: 1400px; margin: 0 auto; overflow-x: hidden; }

        .card { background-color: var(--bg-surface); border: 1px solid var(--border-muted); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 24px; }

        /* --- MOBILE RESPONSIVE TABLE --- */
        @media (max-width: 850px) {
            thead { display: none !important; }
            table, tbody, tr, td { display: block !important; width: 100% !important; }
            tbody tr { background: rgba(0,0,0,0.2); border: 1px solid var(--border-muted); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; }
            tbody td { display: flex !important; justify-content: space-between !important; align-items: center !important; padding: 10px 0 !important; border-bottom: 1px dashed var(--border-muted); }
            tbody td:last-child { border-bottom: none; }
            tbody td::before { content: attr(data-label); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); }
        }

        @media (min-width: 851px) {
            thead { display: table-header-group; }
            tbody tr { display: table-row; }
            td { display: table-cell; padding: 16px; border-bottom: 1px solid var(--border-muted); }
        }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 16px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-secondary); border-bottom: 1px solid var(--border-muted); text-align: left; }
        
        .grid-responsive { display: grid; grid-template-columns: 1fr; gap: 16px; }
        @media (min-width: 768px) { .grid-responsive { grid-template-columns: repeat(3, 1fr); } }

        input, select { width: 100%; background: var(--bg-main); border: 1px solid var(--border-muted); border-radius: var(--radius-md); padding: 12px; color: var(--text-primary); }
        button { background: var(--brand-primary); color: var(--bg-main); border: none; padding: 12px 20px; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header style="margin-bottom: 20px;">
        <h1>Utility & Broadband Cost Calculator</h1>
    </header>

    <div class="card">
        <table>
            <thead>
                <tr><th>Provider</th><th>Electricity</th><th>Gas</th><th>Internet</th><th>Total</th></tr>
            </thead>
            <tbody id="results-body">
                <tr><td colspan="5" style="text-align:center;">Add a profile to calculate.</td></tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <h3>Usage Parameters</h3>
        <div class="grid-responsive" style="margin-top:16px;">
            <div><label>Elec Days</label><input type="number" id="days-elec" value="31" oninput="calculate()"></div>
            <div><label>Elec kWh</label><input type="number" id="kwh-elec" value="790" oninput="calculate()"></div>
            <div><label>Gas kWh</label><input type="number" id="kwh-gas" value="402" oninput="calculate()"></div>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Provider Matrix</h3>
            <button onclick="addProvider()">+ Add Profile</button>
        </div>
        <div id="providers-container"></div>
    </div>
</div>

<script>
    function round(n) { return Math.round((n + Number.EPSILON) * 100) / 100; }

    function addProvider() {
        const div = document.createElement('div');
        div.className = 'provider-block';
        div.style = 'border-top: 1px solid #334; margin-top: 20px; padding-top: 20px;';
        div.innerHTML = `
            <div class="grid-responsive">
                <input type="text" class="p-name" placeholder="Name" oninput="calculate()">
                <input type="number" class="p-daily-elec" placeholder="Elec Daily $" oninput="calculate()">
                <input type="number" class="p-rate-elec" placeholder="Elec Rate $/kWh" oninput="calculate()">
            </div>
        `;
        document.getElementById('providers-container').appendChild(div);
    }

    function calculate() {
        const days = parseFloat(document.getElementById('days-elec').value) || 0;
        const kWh = parseFloat(document.getElementById('kwh-elec').value) || 0;
        const tbody = document.getElementById('results-body');
        tbody.innerHTML = "";

        document.querySelectorAll('.provider-block').forEach(block => {
            const name = block.querySelector('.p-name').value;
            const daily = parseFloat(block.querySelector('.p-daily-elec').value) || 0;
            const rate = parseFloat(block.querySelector('.p-rate-elec').value) || 0;
            
            const total = round((daily * days) + (rate * kWh));
            
            tbody.innerHTML += `
                <tr>
                    <td data-label="Provider">${name || 'Unnamed'}</td>
                    <td data-label="Electricity">$${total.toFixed(2)}</td>
                    <td data-label="Gas">-</td>
                    <td data-label="Internet">-</td>
                    <td data-label="Total">$${total.toFixed(2)}</td>
                </tr>
            `;
        });
    }
</script>
</body>
</html>
